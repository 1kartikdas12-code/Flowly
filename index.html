<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Flowly"/>
  <meta name="theme-color" content="#6366F1"/>
  <title>Flowly</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" href="icons/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg: #F7F8FC;
  --bg2: #FFFFFF;
  --bg3: #F0F1F8;
  --surface: #FFFFFF;
  --surface2: #F4F5FF;
  --border: rgba(0,0,0,0.06);
  --text: #0A0A1A;
  --text2: #6B7280;
  --text3: #9CA3AF;
  --indigo: #6366F1;
  --indigo2: #818CF8;
  --indigo-glow: rgba(99,102,241,0.2);
  --green: #10B981;
  --green-glow: rgba(16,185,129,0.2);
  --peach: #F97316;
  --peach-glow: rgba(249,115,22,0.18);
  --red: #EF4444;
  --yellow: #F59E0B;
  --purple: #8B5CF6;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
  --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.06), 0 16px 40px rgba(0,0,0,0.1);
  --nav-bg: rgba(255,255,255,0.85);
  --radius: 20px;
  --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #08080F;
  --bg2: #0F0F1A;
  --bg3: #13131F;
  --surface: #161625;
  --surface2: #1E1E30;
  --border: rgba(255,255,255,0.07);
  --text: #F1F1FF;
  --text2: #8B8BA8;
  --text3: #555570;
  --indigo-glow: rgba(99,102,241,0.15);
  --green-glow: rgba(16,185,129,0.15);
  --peach-glow: rgba(249,115,22,0.12);
  --card-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.4);
  --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.4), 0 16px 40px rgba(0,0,0,0.5);
  --nav-bg: rgba(15,15,26,0.92);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  transition:background 0.3s ease, color 0.3s ease;
}
#root{height:100%}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
input,select,button,textarea{font-family:'Inter',sans-serif}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideRight{from{transform:translateX(-24px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes streakPop{0%{transform:scale(1)}50%{transform:scale(1.4) rotate(-5deg)}100%{transform:scale(1)}}
@keyframes checkBounce{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes toastSlide{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes timerPulse{0%,100%{box-shadow:0 0 0 0 var(--indigo-glow)}50%{box-shadow:0 0 0 12px transparent}}
@keyframes onboardSlide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── App shell ── */
.app{height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;position:relative}

/* ── Onboarding ── */
.onboard{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;
  padding:0 28px;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
.onboard-slide{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;animation:onboardSlide 0.4s ease}
.onboard-icon{font-size:72px;margin-bottom:28px;animation:popIn 0.5s ease}
.onboard-title{font-family:'Fraunces',serif;font-size:36px;font-weight:500;color:var(--text);line-height:1.1;margin-bottom:14px;letter-spacing:-1px}
.onboard-sub{font-size:16px;color:var(--text2);line-height:1.6;max-width:300px}
.onboard-dots{display:flex;gap:8px;justify-content:center;margin:32px 0 24px}
.onboard-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.3s ease}
.onboard-dot.active{width:24px;border-radius:4px;background:var(--indigo)}
.onboard-btn{
  width:100%;padding:17px;border-radius:18px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#6366F1,#8B5CF6);
  color:white;font-size:16px;font-weight:700;
  box-shadow:0 8px 30px rgba(99,102,241,0.4);
  transition:all 0.2s cubic-bezier(.34,1.2,.64,1);
  margin-bottom:16px;
}
.onboard-btn:active{transform:scale(0.97)}
.onboard-skip{background:none;border:none;color:var(--text3);font-size:14px;font-weight:500;cursor:pointer;padding:10px;width:100%;text-align:center}

/* ── Screen ── */
.screen{flex:1;overflow-y:auto;padding-bottom:100px}
.screen-pad{padding:0 20px}

/* ── Header ── */
.page-header{padding:20px 20px 0}
.eyebrow{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.6px;text-transform:uppercase;margin-bottom:5px}
.page-title{font-family:'Fraunces',serif;font-size:36px;font-weight:500;color:var(--text);letter-spacing:-1.2px;line-height:1.05}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:6px;font-weight:500}

/* ── Top bar ── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 0;
  padding-top:calc(14px + env(safe-area-inset-top));
}
.top-bar-logo{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:var(--text);letter-spacing:-0.5px}
.top-bar-logo span{color:var(--indigo)}
.top-bar-actions{display:flex;gap:10px;align-items:center}
.icon-btn{
  width:38px;height:38px;border-radius:13px;border:none;
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--card-shadow);color:var(--text2);
  transition:var(--transition);-webkit-tap-highlight-color:transparent;
  border:1px solid var(--border);
}
.icon-btn:active{transform:scale(0.92)}

/* ── Streak banner ── */
.streak-banner{
  margin:16px 20px 0;
  background:linear-gradient(135deg,var(--indigo),var(--purple));
  border-radius:20px;padding:16px 18px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 8px 30px rgba(99,102,241,0.3);
  position:relative;overflow:hidden;
}
.streak-banner::before{
  content:'';position:absolute;top:-20px;right:-20px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.streak-fire{font-size:32px;animation:streakPop 2s ease infinite}
.streak-info{flex:1}
.streak-num{font-size:28px;font-weight:800;color:white;line-height:1}
.streak-label{font-size:12px;color:rgba(255,255,255,0.7);font-weight:500;margin-top:2px}
.streak-days{display:flex;gap:5px;margin-top:10px}
.streak-day{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.1);transition:all 0.2s}
.streak-day.done{background:rgba(255,255,255,0.25);color:white}
.streak-day.today{background:rgba(255,255,255,0.9);color:var(--indigo);box-shadow:0 2px 8px rgba(255,255,255,0.3)}

/* ── Progress card ── */
.progress-card{
  margin:12px 20px 0;
  background:var(--surface);border-radius:20px;padding:16px 18px;
  box-shadow:var(--card-shadow);border:1px solid var(--border);
}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.progress-title{font-size:13px;font-weight:600;color:var(--text2)}
.progress-pct{font-size:22px;font-weight:800;color:var(--indigo)}
.progress-track{height:6px;background:var(--bg3);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--indigo),var(--purple));transition:width 0.6s cubic-bezier(.4,0,.2,1)}
.progress-stats{display:flex;gap:16px;margin-top:12px}
.pstat{flex:1;text-align:center}
.pstat-num{font-size:18px;font-weight:800;color:var(--text)}
.pstat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px}

/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:20px 20px 12px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.4px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.section-badge{background:var(--surface2);color:var(--text2);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.section-action{font-size:12px;font-weight:600;color:var(--indigo);background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* ── AI Plan button ── */
.ai-btn{
  margin:0 20px 4px;
  padding:16px 20px;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  background-size:200% 200%;
  animation:gradientShift 4s ease infinite;
  border:none;border-radius:20px;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  color:white;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  transition:all 0.2s cubic-bezier(.34,1.2,.64,1);
  -webkit-tap-highlight-color:transparent;
  width:calc(100% - 40px);
  position:relative;overflow:hidden;
}
[data-theme="dark"] .ai-btn{background:linear-gradient(135deg,#1e1b4b,#312e81,#1e1b4b)}
.ai-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);border-radius:inherit}
.ai-btn:active{transform:scale(0.97)}
.ai-btn-icon{width:40px;height:40px;border-radius:13px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ai-btn-text{flex:1;text-align:left}
.ai-btn-title{font-size:15px;font-weight:700;color:white}
.ai-btn-sub{font-size:11.5px;color:rgba(255,255,255,0.55);margin-top:2px}
.ai-btn-arrow{font-size:18px;color:rgba(255,255,255,0.4)}

/* ── Task card ── */
.task-card{
  background:var(--surface);border-radius:18px;
  padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--card-shadow);
  margin-bottom:8px;
  transition:var(--transition);
  position:relative;
  -webkit-user-select:none;user-select:none;
  border:1px solid var(--border);
  animation:fadeUp 0.25s ease both;
}
.task-card:active{transform:scale(0.985);box-shadow:none}
.task-card.done-card{opacity:0.6}
.task-card.removing{opacity:0;transform:translateX(30px) scale(0.95);transition:all 0.2s ease}

/* Priority stripe */
.task-card::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:0 3px 3px 0;opacity:0;transition:opacity 0.2s}
.task-card.pri-high::before{background:var(--red);opacity:1}
.task-card.pri-medium::before{background:var(--yellow);opacity:1}
.task-card.pri-low::before{background:var(--green);opacity:1}

/* ── Check circle ── */
.check-circle{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  background:var(--surface2);
}
.check-circle.done{
  background:linear-gradient(135deg,var(--indigo),var(--purple));
  border-color:transparent;
  box-shadow:0 2px 12px var(--indigo-glow);
}
.check-circle.done svg{animation:checkBounce 0.3s ease}

/* ── Task text ── */
.task-text{flex:1;font-size:15px;font-weight:500;color:var(--text);line-height:1.4;transition:all 0.2s}
.task-text.done{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.task-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;letter-spacing:0.3px}
.tag-ai{background:linear-gradient(135deg,#1e1b4b,#312e81);color:rgba(255,255,255,0.8)}
.tag-high{background:rgba(239,68,68,0.1);color:var(--red)}
.tag-medium{background:rgba(245,158,11,0.1);color:var(--yellow)}
.tag-low{background:rgba(16,185,129,0.1);color:var(--green)}

/* ── Kebab ── */
.kebab-btn{
  width:32px;height:32px;border-radius:10px;border:none;
  background:transparent;cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
  color:var(--text3);transition:var(--transition);opacity:0;
}
.task-card:hover .kebab-btn,.task-card:focus-within .kebab-btn{opacity:1}
/* Always show on touch */
@media (hover:none){.kebab-btn{opacity:1}}
.kebab-btn:active{background:var(--bg3)}

/* ── Context menu ── */
.ctx{
  position:absolute;right:10px;top:52px;z-index:300;
  background:var(--surface);border-radius:18px;
  box-shadow:0 12px 48px rgba(0,0,0,0.2),0 2px 8px rgba(0,0,0,0.1);
  overflow:hidden;min-width:160px;
  animation:fadeIn 0.14s ease;
  border:1px solid var(--border);
}
.ctx-item{
  padding:13px 16px;font-size:13.5px;font-weight:500;color:var(--text);
  cursor:pointer;display:flex;align-items:center;gap:10px;
  border:none;background:none;width:100%;text-align:left;
  transition:background 0.1s;-webkit-tap-highlight-color:transparent;
}
.ctx-item:active{background:var(--bg3)}
.ctx-item.danger{color:var(--red)}
.ctx-divider{height:1px;background:var(--border);margin:2px 0}

/* ── Add task ── */
.add-task-box{
  background:var(--surface);border-radius:18px;
  padding:14px 16px;margin-bottom:10px;
  border:1.5px solid var(--indigo);
  box-shadow:0 0 0 4px var(--indigo-glow);
  animation:fadeIn 0.18s ease;
}

/* ── Input styles ── */
.input{
  width:100%;padding:14px 16px;border-radius:16px;
  border:1.5px solid var(--border);font-size:16px;
  outline:none;color:var(--text);
  background:var(--bg3);transition:all 0.18s ease;
  -webkit-appearance:none;
}
.input:focus{border-color:var(--indigo);background:var(--surface);box-shadow:0 0 0 3px var(--indigo-glow)}
.input::placeholder{color:var(--text3)}
.textarea{resize:none;line-height:1.5}

/* ── Buttons ── */
.btn{
  padding:13px 22px;border-radius:50px;border:none;
  cursor:pointer;font-size:15px;font-weight:600;
  transition:all 0.2s cubic-bezier(.34,1.2,.64,1);
  -webkit-tap-highlight-color:transparent;
  display:inline-flex;align-items:center;gap:7px;
}
.btn:active{transform:scale(0.95)}
.btn-primary{background:linear-gradient(135deg,var(--indigo),var(--purple));color:white;box-shadow:0 4px 20px var(--indigo-glow)}
.btn-green{background:linear-gradient(135deg,var(--green),#059669);color:white;box-shadow:0 4px 20px var(--green-glow)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-danger{background:rgba(239,68,68,0.1);color:var(--red)}
.btn-full{width:100%;justify-content:center}

/* ── FAB ── */
.fab{
  position:fixed;
  bottom:calc(88px + env(safe-area-inset-bottom));right:20px;
  width:56px;height:56px;border-radius:50%;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index:60;-webkit-tap-highlight-color:transparent;
  color:white;font-size:26px;
}
.fab-todo{background:linear-gradient(135deg,var(--indigo),var(--purple));box-shadow:0 8px 28px rgba(99,102,241,0.45)}
.fab-todo.open{background:linear-gradient(135deg,#EF4444,#DC2626);box-shadow:0 8px 28px rgba(239,68,68,0.4)}
.fab-cal{background:linear-gradient(135deg,var(--peach),#EA580C);box-shadow:0 8px 28px var(--peach-glow)}
.fab:active{transform:scale(0.9)}

/* ── Bottom nav ── */
.bottom-nav{
  position:relative;
  background:var(--nav-bg);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border-top:1px solid var(--border);
  padding:6px 8px;
  padding-bottom:calc(6px + env(safe-area-inset-bottom));
  display:flex;z-index:100;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;flex:1;padding:7px 4px;
  border:none;background:none;cursor:pointer;
  border-radius:18px;transition:var(--transition);
  font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.3px;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn.active{color:var(--text)}
.nav-btn.active .nav-icon{background:linear-gradient(135deg,var(--indigo),var(--purple));box-shadow:0 4px 16px var(--indigo-glow)}
.nav-icon{
  width:44px;height:44px;border-radius:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
}

/* ── Modal ── */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:flex-end;z-index:400;
}
.modal-sheet{
  width:100%;background:var(--surface);
  border-radius:30px 30px 0 0;
  padding:10px 22px;
  padding-bottom:calc(32px + env(safe-area-inset-bottom));
  animation:slideUp 0.3s cubic-bezier(.34,1.1,.64,1);
  max-height:92dvh;overflow-y:auto;
  border-top:1px solid var(--border);
}
.modal-handle{width:40px;height:4px;border-radius:4px;background:var(--border);margin:10px auto 22px}
.modal-title{font-family:'Fraunces',serif;font-size:24px;font-weight:500;color:var(--text);margin-bottom:22px;letter-spacing:-0.5px}
.form-label{font-size:10.5px;font-weight:700;color:var(--text3);letter-spacing:1.3px;text-transform:uppercase;display:block;margin-bottom:7px}
.form-row{margin-bottom:16px}

/* ── Date strip ── */
.date-strip{display:flex;gap:5px;overflow-x:auto;padding:14px 20px 18px}
.date-chip{
  display:flex;flex-direction:column;align-items:center;
  min-width:52px;padding:12px 8px;border-radius:20px;
  cursor:pointer;transition:all 0.25s cubic-bezier(.34,1.56,.64,1);
  border:none;background:none;-webkit-tap-highlight-color:transparent;
}
.date-chip.selected{background:linear-gradient(135deg,var(--peach),#EA580C);box-shadow:0 4px 18px var(--peach-glow);transform:scale(1.08)}
.date-day{font-size:10.5px;font-weight:700;color:var(--text3);margin-bottom:5px;transition:color 0.2s}
.date-num{font-size:20px;font-weight:800;color:var(--text);line-height:1;transition:color 0.2s}
.date-chip.selected .date-day,.date-chip.selected .date-num{color:white}
.date-dot{width:4px;height:4px;border-radius:50%;margin-top:5px;background:transparent}
.date-dot.has-event{background:var(--peach)}
.date-chip.selected .date-dot.has-event{background:rgba(255,255,255,0.7)}

/* ── Schedule card ── */
.sched-card{
  background:var(--surface);border-radius:18px;padding:14px 16px;
  box-shadow:var(--card-shadow);
  display:flex;align-items:center;gap:12px;
  transition:var(--transition);position:relative;
  border:1px solid var(--border);
}
.sched-card:active{transform:scale(0.985)}
.sched-emoji{
  width:44px;height:44px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}

/* ── Focus timer ── */
.timer-card{
  margin:0 20px 16px;
  background:var(--surface);border-radius:24px;
  padding:24px 20px;
  box-shadow:var(--card-shadow);
  border:1px solid var(--border);
  text-align:center;
}
.timer-ring{
  width:160px;height:160px;border-radius:50%;
  margin:0 auto 20px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.timer-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.timer-bg{fill:none;stroke:var(--bg3);stroke-width:8}
.timer-progress{fill:none;stroke:url(#timerGrad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-inner{position:relative;z-index:1;text-align:center}
.timer-time{font-size:42px;font-weight:800;color:var(--text);letter-spacing:-2px;line-height:1}
.timer-phase{font-size:12px;font-weight:600;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-top:4px}
.timer-btn{
  padding:11px 24px;border-radius:50px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.timer-btn:active{transform:scale(0.95)}
.timer-task-label{font-size:13px;color:var(--text2);margin-bottom:16px;font-weight:500}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 20px 16px}
.stat-card{
  background:var(--surface);border-radius:20px;padding:16px;
  box-shadow:var(--card-shadow);border:1px solid var(--border);
}
.stat-icon{font-size:24px;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-1px}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px}

/* ── Weekly chart ── */
.chart-card{
  margin:0 20px 16px;
  background:var(--surface);border-radius:20px;padding:18px;
  box-shadow:var(--card-shadow);border:1px solid var(--border);
}
.chart-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:16px}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:80px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
.chart-bar-track{flex:1;width:100%;background:var(--bg3);border-radius:8px;overflow:hidden;display:flex;align-items:flex-end}
.chart-bar-fill{width:100%;border-radius:8px;transition:height 0.6s cubic-bezier(.4,0,.2,1);background:linear-gradient(180deg,var(--indigo),var(--purple))}
.chart-bar-fill.today{background:linear-gradient(180deg,var(--peach),#EA580C)}
.chart-day-label{font-size:10px;font-weight:700;color:var(--text3)}

/* ── Habit tracker ── */
.habit-card{
  background:var(--surface);border-radius:20px;padding:16px 18px;
  box-shadow:var(--card-shadow);border:1px solid var(--border);
  margin-bottom:10px;
}
.habit-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.habit-emoji{font-size:22px}
.habit-name{font-size:14px;font-weight:600;color:var(--text)}
.habit-streak{font-size:11px;color:var(--text3);margin-top:1px}
.habit-dots{display:flex;gap:5px}
.habit-dot{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;cursor:pointer;
  transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.habit-dot.done{background:linear-gradient(135deg,var(--indigo),var(--purple));color:white;box-shadow:0 2px 8px var(--indigo-glow)}
.habit-dot.missed{background:var(--bg3);color:var(--text3)}
.habit-dot.today{border:2px solid var(--indigo);color:var(--indigo);background:var(--surface2)}
.habit-dot.today.done{border-color:transparent}

/* ── Goal rows ── */
.goal-row{
  display:flex;align-items:center;gap:12px;padding:14px 0;
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:padding-left 0.15s;-webkit-tap-highlight-color:transparent;
}
.goal-row:last-child{border-bottom:none}
.goal-row:active{opacity:0.7}

/* ── Emoji/Color picker ── */
.emoji-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ep-btn{
  width:44px;height:44px;border-radius:13px;border:2px solid transparent;
  background:var(--bg3);cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;-webkit-tap-highlight-color:transparent;
}
.ep-btn.sel{border-color:var(--indigo);background:var(--surface2);box-shadow:0 0 0 2px var(--indigo-glow)}
.ep-btn:active{transform:scale(0.88)}
.color-row{display:flex;gap:10px;margin-bottom:0}
.c-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.c-dot.sel{border-color:var(--text);transform:scale(1.18)}

/* ── AI modal ── */
.ai-modal-header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.ai-modal-icon{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#1e1b4b,#312e81);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.suggestion-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.chip{
  padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:600;
  background:var(--surface2);color:var(--indigo);cursor:pointer;
  border:1px solid rgba(99,102,241,0.2);
  transition:all 0.15s;-webkit-tap-highlight-color:transparent;
}
.chip:active{background:var(--indigo);color:white;transform:scale(0.95)}
.ai-task-item{
  background:var(--bg3);border-radius:16px;padding:13px 15px;
  margin-bottom:8px;display:flex;align-items:flex-start;gap:11px;
  border:1px solid var(--border);
  animation:fadeUp 0.2s ease both;
}
.pri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.skeleton{
  background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);
  background-size:200% 100%;animation:shimmer 1.2s infinite;
  border-radius:12px;margin-bottom:9px;
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);
  padding:12px 20px;border-radius:30px;
  font-size:13.5px;font-weight:600;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
  z-index:500;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  animation:toastSlide 0.3s cubic-bezier(.34,1.2,.64,1);
}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px}
.empty-emoji{font-size:56px;display:block;margin-bottom:14px;animation:popIn 0.4s ease}
.empty-title{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--text2);line-height:1.6}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:4px 0}
.pro-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--yellow),var(--peach));color:white;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:0.5px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ── Constants ── */
const STORAGE = "flowly_v1";
const DAYS_SHORT = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const DAYS_FULL  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS     = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_S   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const EMOJIS     = ["💻","🧑‍💼","🎨","🍱","📞","📋","🏃","🌿","⚡","🎯","📚","💡","🎵","✈️","🏠","💰","🧘","💪","🔬","🎪"];
const COLORS     = ["#6366F1","#F97316","#10B981","#F59E0B","#EF4444","#8B5CF6"];
const TIMES      = ["6 AM","7 AM","8 AM","9 AM","10 AM","11 AM","12 PM","1 PM","2 PM","3 PM","4 PM","5 PM","6 PM","7 PM","8 PM","9 PM"];
const ONBOARD    = [
  {icon:"✨",title:"Welcome to Flowly",sub:"The productivity app that actually makes you want to work. Beautiful. Smart. Yours."},
  {icon:"🎯",title:"Plan with AI",sub:"Tell Flowly your goal and watch it build your perfect day in seconds."},
  {icon:"🔥",title:"Build Momentum",sub:"Track streaks, habits, and progress. Every day compounds into something extraordinary."},
  {icon:"🌙",title:"Day & Night",sub:"Flowly adapts to you — stunning light mode for mornings, elegant dark for late nights."},
];
const GOAL_SUGGESTIONS = ["Be more productive","Study for exams","Get fit & healthy","Launch a project","Improve morning routine","Learn a new skill"];

/* ── Smart AI task generator ── */
const AI_TASKS = {
  "productive": [
    {title:"📋 Write today's top 3 priorities",priority:"high"},
    {title:"📧 Clear inbox to zero",priority:"high"},
    {title:"⏱️ Do one deep work session (90 mins)",priority:"high"},
    {title:"📅 Review and update project timeline",priority:"medium"},
    {title:"🔕 Set focus mode — no distractions for 2 hours",priority:"medium"},
  ],
  "study": [
    {title:"📖 Read and highlight key chapters",priority:"high"},
    {title:"✍️ Create summary notes from today's material",priority:"high"},
    {title:"🧠 Practice recall — test yourself without notes",priority:"high"},
    {title:"📝 Solve 10 practice problems",priority:"medium"},
    {title:"🔁 Review yesterday's flashcards",priority:"low"},
  ],
  "fit": [
    {title:"🏃 30-minute morning run or walk",priority:"high"},
    {title:"💪 Strength training — upper body focus",priority:"high"},
    {title:"🥗 Meal prep healthy lunch and dinner",priority:"medium"},
    {title:"💧 Drink 8 glasses of water today",priority:"medium"},
    {title:"🧘 10-minute evening stretch",priority:"low"},
  ],
  "project": [
    {title:"🗺️ Define project scope and milestones",priority:"high"},
    {title:"🎨 Create first prototype or draft",priority:"high"},
    {title:"📊 Research 3 competitors or references",priority:"medium"},
    {title:"💬 Share progress with one person for feedback",priority:"medium"},
    {title:"📓 Document decisions and next steps",priority:"low"},
  ],
  "morning": [
    {title:"🌅 Wake up 30 minutes earlier than usual",priority:"high"},
    {title:"🧘 10-minute meditation or breathing",priority:"high"},
    {title:"📓 5-minute journaling session",priority:"medium"},
    {title:"🚿 Cold shower for energy boost",priority:"medium"},
    {title:"☕ Make coffee and plan the day intentionally",priority:"low"},
  ],
  "skill": [
    {title:"📹 Watch one focused tutorial (30 mins)",priority:"high"},
    {title:"💻 Practice by building something small",priority:"high"},
    {title:"📚 Read one article on the topic",priority:"medium"},
    {title:"🗣️ Teach back what you learned (explain to someone)",priority:"medium"},
    {title:"📝 Write 3 things you learned today",priority:"low"},
  ],
};

function generateTasks(goal) {
  const g = goal.toLowerCase();
  if (g.includes("product") || g.includes("work")) return AI_TASKS.productive;
  if (g.includes("study") || g.includes("exam") || g.includes("learn")) return AI_TASKS.study;
  if (g.includes("fit") || g.includes("health") || g.includes("gym") || g.includes("exercise")) return AI_TASKS.fit;
  if (g.includes("project") || g.includes("launch") || g.includes("build") || g.includes("creat")) return AI_TASKS.project;
  if (g.includes("morning") || g.includes("routine") || g.includes("wake")) return AI_TASKS.morning;
  if (g.includes("skill") || g.includes("learn") || g.includes("course")) return AI_TASKS.skill;
  // default mix
  return [
    {title:"🎯 Define your #1 goal for today",priority:"high"},
    {title:"⏱️ Work in focused 25-minute blocks",priority:"high"},
    {title:"📋 Review and prioritize your task list",priority:"medium"},
    {title:"💬 Connect with someone who inspires you",priority:"medium"},
    {title:"🌿 Take a proper break and recharge",priority:"low"},
  ];
}

/* ── Default data ── */
const defaults = {
  tasks: [
    {id:1,title:"Morning meditation 🧘",done:true,ai:false,priority:"medium",createdAt:Date.now()-86400000},
    {id:2,title:"Review design mockups",done:false,ai:false,priority:"high",createdAt:Date.now()-3600000},
    {id:3,title:"Deep work session — no distractions",done:false,ai:false,priority:"high",createdAt:Date.now()-1800000},
    {id:4,title:"Evening walk 🌿",done:false,ai:false,priority:"low",createdAt:Date.now()-900000},
  ],
  schedule: [
    {id:1,time:"9 AM",title:"Deep Focus Work",color:"#6366F1",emoji:"💻"},
    {id:2,time:"10 AM",title:"Team Standup",color:"#F97316",emoji:"🧑‍💼"},
    {id:3,time:"1 PM",title:"Lunch Break",color:"#10B981",emoji:"🍱"},
    {id:4,time:"3 PM",title:"Client Review",color:"#8B5CF6",emoji:"📞"},
  ],
  goals: [
    {id:1,text:"Ship the new feature",done:false},
    {id:2,text:"Exercise 4x this week",done:true},
    {id:3,text:"Read 20 pages daily",done:false},
  ],
  habits: [
    {id:1,name:"Meditate",emoji:"🧘",history:[1,1,1,0,1,1,0],color:"#6366F1"},
    {id:2,name:"Exercise",emoji:"💪",history:[1,0,1,1,1,0,1],color:"#10B981"},
    {id:3,name:"Read",emoji:"📚",history:[1,1,0,1,0,1,1],color:"#F97316"},
  ],
  streak: 7,
  theme: "light",
  onboarded: false,
  weekStats: [3,5,4,7,6,4,2],
};

function load(){try{const s=localStorage.getItem(STORAGE);return s?JSON.parse(s):defaults;}catch{return defaults;}}
function save(d){try{localStorage.setItem(STORAGE,JSON.stringify(d));}catch{}}
function getDates(){
  const t=new Date();
  return Array.from({length:14},(_,i)=>{const d=new Date(t);d.setDate(t.getDate()-3+i);return d;});
}
function parseTime(t){const[h,pm]=t.split(" ");let hr=parseInt(h);if(pm==="PM"&&hr!==12)hr+=12;if(pm==="AM"&&hr===12)hr=0;return hr;}

/* ── Check SVG ── */
const CheckSVG=()=>(
  <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
    <path d="M1.5 5.5L5.5 9.5L12.5 1.5" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

/* ── Toast ── */
function Toast({msg,emoji="✓"}){
  return <div className="toast"><span>{emoji}</span>{msg}</div>;
}

/* ── Modal ── */
function Modal({title,children,onClose}){
  return(
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        {title&&<h2 className="modal-title">{title}</h2>}
        {children}
      </div>
    </div>
  );
}

/* ── Onboarding ── */
function Onboarding({onDone}){
  const [step,setStep]=useState(0);
  const next=()=>{if(step<ONBOARD.length-1)setStep(s=>s+1);else onDone();};
  const o=ONBOARD[step];
  return(
    <div className="onboard">
      <div style={{display:"flex",justifyContent:"flex-end",paddingTop:16}}>
        <button className="onboard-skip" style={{width:"auto"}} onClick={onDone}>Skip</button>
      </div>
      <div className="onboard-slide" key={step}>
        <div className="onboard-icon">{o.icon}</div>
        <h1 className="onboard-title">{o.title}</h1>
        <p className="onboard-sub">{o.sub}</p>
      </div>
      <div>
        <div className="onboard-dots">
          {ONBOARD.map((_,i)=><div key={i} className={`onboard-dot ${i===step?"active":""}`}/>)}
        </div>
        <button className="onboard-btn" onClick={next}>
          {step<ONBOARD.length-1?"Continue →":"Get Started ✨"}
        </button>
      </div>
    </div>
  );
}

/* ── Focus Timer ── */
function FocusTimer({tasks}){
  const WORK=25*60,BREAK=5*60;
  const [running,setRunning]=useState(false);
  const [time,setTime]=useState(WORK);
  const [isBreak,setIsBreak]=useState(false);
  const [rounds,setRounds]=useState(0);
  const [selectedTask,setSelectedTask]=useState(null);
  const interval=useRef(null);
  const total=isBreak?BREAK:WORK;
  const pct=1-(time/total);
  const r=76,circ=2*Math.PI*r;

  useEffect(()=>{
    if(running){
      interval.current=setInterval(()=>{
        setTime(t=>{
          if(t<=1){
            clearInterval(interval.current);
            setRunning(false);
            if(!isBreak){setIsBreak(true);setTime(BREAK);setRounds(r=>r+1);}
            else{setIsBreak(false);setTime(WORK);}
            return 0;
          }
          return t-1;
        });
      },1000);
    }
    return()=>clearInterval(interval.current);
  },[running,isBreak]);

  const reset=()=>{clearInterval(interval.current);setRunning(false);setTime(isBreak?BREAK:WORK);};
  const mins=String(Math.floor(time/60)).padStart(2,"0");
  const secs=String(time%60).padStart(2,"0");
  const pendingTasks=tasks.filter(t=>!t.done);

  return(
    <div className="timer-card">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:1.3,textTransform:"uppercase"}}>Focus Timer</div>
          <div style={{fontSize:13,color:"var(--text2)",marginTop:2}}>{rounds} round{rounds!==1?"s":""} completed</div>
        </div>
        <span className="pro-badge">⚡ PRO</span>
      </div>
      {selectedTask&&<div className="timer-task-label">🎯 {selectedTask}</div>}
      <div className="timer-ring">
        <svg width="160" height="160" viewBox="0 0 168 168">
          <defs>
            <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor={isBreak?"#10B981":"#6366F1"}/>
              <stop offset="100%" stopColor={isBreak?"#059669":"#8B5CF6"}/>
            </linearGradient>
          </defs>
          <circle className="timer-bg" cx="84" cy="84" r={r}/>
          <circle className="timer-progress" cx="84" cy="84" r={r}
            strokeDasharray={circ}
            strokeDashoffset={circ*(1-pct)}
          />
        </svg>
        <div className="timer-inner">
          <div className="timer-time">{mins}:{secs}</div>
          <div className="timer-phase" style={{color:isBreak?"var(--green)":"var(--indigo)"}}>{isBreak?"Break ☕":"Focus 💪"}</div>
        </div>
      </div>
      <div className="timer-controls">
        <button className="timer-btn btn" style={{background:running?"rgba(239,68,68,0.1)":"linear-gradient(135deg,var(--indigo),var(--purple))",color:running?"var(--red)":"white",boxShadow:running?"none":"0 4px 16px var(--indigo-glow)"}} onClick={()=>setRunning(r=>!r)}>
          {running?"⏸ Pause":"▶ Start"}
        </button>
        <button className="timer-btn btn btn-ghost" onClick={reset}>↺ Reset</button>
      </div>
      {pendingTasks.length>0&&!selectedTask&&(
        <div style={{marginTop:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:1.2,textTransform:"uppercase",marginBottom:8}}>Focus on</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {pendingTasks.slice(0,3).map(t=>(
              <button key={t.id} className="chip" style={{fontSize:12}} onClick={()=>setSelectedTask(t.title)}>
                {t.title.length>30?t.title.slice(0,30)+"…":t.title}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── AI Modal ── */
function AIModal({onClose,onAdd}){
  const [goal,setGoal]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);

  const generate=useCallback((g)=>{
    const input=g??goal;
    if(!input.trim())return;
    setLoading(true);setResult(null);
    setTimeout(()=>{
      setResult(generateTasks(input));
      setLoading(false);
    },1600);
  },[goal]);

  const addAll=()=>{
    result.forEach(t=>onAdd(t.title,true,t.priority));
    onClose();
  };

  return(
    <Modal onClose={onClose}>
      <div className="ai-modal-header">
        <div className="ai-modal-icon">✨</div>
        <div>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:500,color:"var(--text)",lineHeight:1.1}}>Plan My Day</h2>
          <p style={{fontSize:12,color:"var(--text2)",marginTop:2}}>AI-powered · instant results</p>
        </div>
      </div>

      {!result&&!loading&&(
        <>
          <div className="form-row">
            <label className="form-label">What's your goal today?</label>
            <textarea className="input textarea" rows={3} value={goal} onChange={e=>setGoal(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();generate();}}}
              placeholder="e.g. Study for my exam, get fit, be productive…"/>
          </div>
          <div className="suggestion-chips" style={{marginBottom:22}}>
            {GOAL_SUGGESTIONS.map(s=>(
              <button key={s} className="chip" onClick={()=>{setGoal(s);generate(s);}}>{s}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-primary btn-full" onClick={()=>generate()} style={{flex:1}}>✨ Generate Tasks</button>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          </div>
        </>
      )}

      {loading&&(
        <div style={{padding:"8px 0"}}>
          <p style={{fontSize:13,color:"var(--text2)",textAlign:"center",marginBottom:18,animation:"pulse 1.2s infinite"}}>🤖 Crafting your perfect day…</p>
          {[56,48,52,44].map((h,i)=><div key={i} className="skeleton" style={{height:h,animationDelay:`${i*0.15}s`}}/>)}
        </div>
      )}

      {result&&(
        <>
          <div style={{marginBottom:18}}>
            {result.map((t,i)=>(
              <div key={i} className="ai-task-item" style={{animationDelay:`${i*0.07}s`}}>
                <div className="pri-dot" style={{background:t.priority==="high"?"var(--red)":t.priority==="medium"?"var(--yellow)":"var(--green)"}}/>
                <span style={{fontSize:14.5,fontWeight:500,color:"var(--text)",lineHeight:1.4,flex:1}}>{t.title}</span>
                <span style={{fontSize:10,fontWeight:700,color:t.priority==="high"?"var(--red)":t.priority==="medium"?"var(--yellow)":"var(--green)",background:t.priority==="high"?"rgba(239,68,68,0.1)":t.priority==="medium"?"rgba(245,158,11,0.1)":"rgba(16,185,129,0.1)",padding:"3px 9px",borderRadius:20,flexShrink:0}}>
                  {t.priority}
                </span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-primary btn-full" onClick={addAll} style={{flex:1}}>➕ Add {result.length} Tasks</button>
            <button className="btn btn-ghost" onClick={()=>{setResult(null);setGoal("");}}>↺ Retry</button>
          </div>
        </>
      )}
    </Modal>
  );
}

/* ════════════════════════════════
   MAIN APP
════════════════════════════════ */
function App(){
  const stored=load();
  const [theme,setTheme]=useState(stored.theme||"light");
  const [onboarded,setOnboarded]=useState(stored.onboarded||false);
  const [tab,setTab]=useState("todo");
  const [tabAnim,setTabAnim]=useState(false);

  const [tasks,setTasks]=useState(stored.tasks||defaults.tasks);
  const [schedule,setSchedule]=useState(stored.schedule||defaults.schedule);
  const [goals,setGoals]=useState(stored.goals||defaults.goals);
  const [habits,setHabits]=useState(stored.habits||defaults.habits);
  const [streak,setStreak]=useState(stored.streak||7);
  const [weekStats,setWeekStats]=useState(stored.weekStats||defaults.weekStats);
  const [selectedDate,setSelectedDate]=useState(new Date().getDate());

  const [showTaskInput,setShowTaskInput]=useState(false);
  const [newTask,setNewTask]=useState("");
  const [taskMenu,setTaskMenu]=useState(null);
  const [editingTask,setEditingTask]=useState(null);
  const [removingId,setRemovingId]=useState(null);

  const [showSchedModal,setShowSchedModal]=useState(false);
  const [schedForm,setSchedForm]=useState({time:"9 AM",title:"",emoji:"💻",color:"#6366F1"});
  const [editSched,setEditSched]=useState(null);

  const [showAI,setShowAI]=useState(false);
  const [toast,setToast]=useState(null);

  const today=new Date();
  const dates=getDates();

  /* theme */
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);

  /* persist */
  useEffect(()=>{
    save({tasks,schedule,goals,habits,streak,weekStats,theme,onboarded});
  },[tasks,schedule,goals,habits,streak,weekStats,theme,onboarded]);

  const showToast=useCallback((msg,emoji="✓")=>{
    setToast({msg,emoji});setTimeout(()=>setToast(null),2300);
  },[]);

  const switchTab=t=>{
    if(t===tab)return;
    setTabAnim(true);setTaskMenu(null);
    setTab(t);setTimeout(()=>setTabAnim(false),250);
  };

  /* tasks */
  const toggleTask=id=>{
    setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
    const t=tasks.find(x=>x.id===id);
    if(!t.done){
      showToast("Task completed! 🎉","✅");
      setWeekStats(ws=>{const n=[...ws];n[today.getDay()]=(n[today.getDay()]||0)+1;return n;});
    }
  };
  const deleteTask=id=>{
    setRemovingId(id);
    setTimeout(()=>{setTasks(ts=>ts.filter(t=>t.id!==id));setRemovingId(null);setTaskMenu(null);},220);
    showToast("Deleted","🗑️");
  };
  const saveTaskTitle=(id,val)=>{if(val.trim())setTasks(ts=>ts.map(t=>t.id===id?{...t,title:val.trim()}:t));};
  const addTask=(title,isAI=false,priority="medium")=>{
    if(!title.trim())return;
    setTasks(ts=>[...ts,{id:Date.now()+Math.random(),title:title.trim(),done:false,ai:isAI,priority,createdAt:Date.now()}]);
  };
  const handleAddTask=()=>{
    if(newTask.trim()){addTask(newTask);setNewTask("");setShowTaskInput(false);showToast("Task added","✅");}
  };
  const clearDone=()=>{
    const c=tasks.filter(t=>t.done).length;
    setTasks(ts=>ts.filter(t=>!t.done));
    if(c)showToast(`${c} task${c>1?"s":""} cleared 🧹`,"🧹");
  };

  /* schedule */
  const deleteBlock=id=>{setSchedule(s=>s.filter(b=>b.id!==id));showToast("Deleted","🗑️");};
  const saveBlock=(id,p)=>setSchedule(s=>s.map(b=>b.id===id?{...b,...p}:b));
  const addBlock=()=>{
    if(schedForm.title.trim()){
      setSchedule(s=>[...s,{id:Date.now(),title:schedForm.title.trim(),time:schedForm.time,emoji:schedForm.emoji,color:schedForm.color}]);
      setSchedForm({time:"9 AM",title:"",emoji:"💻",color:"#6366F1"});setShowSchedModal(false);
      showToast("Block added 📅","📅");
    }
  };

  /* goals & habits */
  const toggleGoal=id=>setGoals(gs=>gs.map(g=>g.id===id?{...g,done:!g.done}:g));
  const toggleHabit=(habitId,dayIdx)=>{
    setHabits(hs=>hs.map(h=>{
      if(h.id!==habitId)return h;
      const hist=[...h.history];
      hist[dayIdx]=hist[dayIdx]?0:1;
      return {...h,history:hist};
    }));
  };

  const sortedSchedule=[...schedule].sort((a,b)=>parseTime(a.time)-parseTime(b.time));
  const doneCount=tasks.filter(t=>t.done).length;
  const totalTasks=tasks.length;
  const pct=Math.round((doneCount/Math.max(totalTasks,1))*100);
  const todayName=DAYS_FULL[today.getDay()];
  const greeting=today.getHours()<12?"Good morning":"today.getHours()<17?"Good afternoon":"Good evening";

  if(!onboarded) return <Onboarding onDone={()=>setOnboarded(true)}/>;

  return(
    <div className="app" onClick={()=>setTaskMenu(null)}>

      {/* ── TOP BAR ── */}
      <div className="top-bar">
        <div className="top-bar-logo">flow<span>ly</span></div>
        <div className="top-bar-actions">
          <button className="icon-btn" onClick={()=>setTheme(t=>t==="light"?"dark":"light")} title="Toggle theme">
            {theme==="light"
              ?<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              :<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            }
          </button>
        </div>
      </div>

      {/* ── SCREEN ── */}
      <div className="screen" style={{opacity:tabAnim?0:1,transform:tabAnim?"translateY(6px)":"none",transition:"all 0.15s ease"}}>

        {/* ════ TODO TAB ════ */}
        {tab==="todo"&&(
          <div>
            <div className="page-header" style={{paddingBottom:16}}>
              <div className="eyebrow">{DAYS_SHORT[today.getDay()]} · {MONTHS_S[today.getMonth()]} {today.getDate()}</div>
              <h1 className="page-title">{todayName}</h1>
              <div className="page-subtitle">{doneCount>0?`${doneCount} done · looking great! 🌟`:`${totalTasks} task${totalTasks!==1?"s":""} waiting for you`}</div>
            </div>

            {/* Streak */}
            <div className="streak-banner">
              <div className="streak-fire">🔥</div>
              <div className="streak-info">
                <div className="streak-num">{streak}</div>
                <div className="streak-label">Day streak — keep it up!</div>
                <div className="streak-days">
                  {DAYS_SHORT.map((d,i)=>{
                    const isToday=i===today.getDay();
                    const isPast=i<today.getDay();
                    return(
                      <div key={d} className={`streak-day ${isPast?"done":""} ${isToday?"today":""}`}>
                        {d[0]}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Progress */}
            <div className="progress-card" style={{marginTop:12}}>
              <div className="progress-top">
                <div className="progress-title">Today's Progress</div>
                <div className="progress-pct">{pct}%</div>
              </div>
              <div className="progress-track">
                <div className="progress-fill" style={{width:`${pct}%`}}/>
              </div>
              <div className="progress-stats">
                <div className="pstat"><div className="pstat-num">{doneCount}</div><div className="pstat-label">Done</div></div>
                <div className="pstat"><div className="pstat-num">{totalTasks-doneCount}</div><div className="pstat-label">Left</div></div>
                <div className="pstat"><div className="pstat-num">{totalTasks}</div><div className="pstat-label">Total</div></div>
              </div>
            </div>

            {/* AI Button */}
            <div style={{margin:"16px 0 8px"}}>
              <button className="ai-btn" onClick={()=>setShowAI(true)}>
                <div className="ai-btn-icon">✨</div>
                <div className="ai-btn-text">
                  <div className="ai-btn-title">Plan My Day with AI</div>
                  <div className="ai-btn-sub">Tell me your goal → get tasks instantly</div>
                </div>
                <div className="ai-btn-arrow">›</div>
              </button>
            </div>

            {/* Add task */}
            {showTaskInput&&(
              <div className="screen-pad" style={{marginBottom:4}}>
                <div className="add-task-box">
                  <input autoFocus className="input" value={newTask}
                    onChange={e=>setNewTask(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")handleAddTask();if(e.key==="Escape"){setShowTaskInput(false);setNewTask("");}}}
                    placeholder="What needs to get done? ✏️"
                    style={{marginBottom:10}}
                  />
                  <div style={{display:"flex",gap:8}}>
                    <button className="btn btn-primary" onClick={handleAddTask}>Add</button>
                    <button className="btn btn-ghost" onClick={()=>{setShowTaskInput(false);setNewTask("");}}>Cancel</button>
                  </div>
                </div>
              </div>
            )}

            {/* Task list */}
            <div className="section-header">
              <div className="section-title">Tasks <span className="section-badge">{totalTasks}</span></div>
              {doneCount>0&&<button className="section-action" onClick={clearDone}>Clear done</button>}
            </div>

            <div className="screen-pad">
              {totalTasks===0&&(
                <div className="empty">
                  <span className="empty-emoji">🌱</span>
                  <p className="empty-title">All clear!</p>
                  <p className="empty-sub">Tap + to add a task or let AI plan your whole day.</p>
                </div>
              )}
              {tasks.map((task,idx)=>(
                <div key={task.id}
                  className={`task-card pri-${task.priority} ${task.done?"done-card":""} ${removingId===task.id?"removing":""}`}
                  style={{animationDelay:`${idx*0.05}s`}}
                  onClick={e=>e.stopPropagation()}>
                  <div className={`check-circle ${task.done?"done":""}`} onClick={()=>toggleTask(task.id)}>
                    {task.done&&<CheckSVG/>}
                  </div>
                  {editingTask?.id===task.id?(
                    <input autoFocus className="input"
                      style={{flex:1,padding:"5px 10px",marginBottom:0,fontSize:15,borderRadius:10}}
                      value={editingTask.val}
                      onChange={e=>setEditingTask({...editingTask,val:e.target.value})}
                      onBlur={()=>{saveTaskTitle(task.id,editingTask.val);setEditingTask(null);}}
                      onKeyDown={e=>{if(e.key==="Enter"){saveTaskTitle(task.id,editingTask.val);setEditingTask(null);}if(e.key==="Escape")setEditingTask(null);}}
                    />
                  ):(
                    <div style={{flex:1,minWidth:0}}>
                      <div className={`task-text ${task.done?"done":""}`}>{task.title}</div>
                      <div className="task-meta">
                        {task.ai&&!task.done&&<span className="task-tag tag-ai">AI</span>}
                        {!task.done&&<span className={`task-tag tag-${task.priority}`}>{task.priority}</span>}
                      </div>
                    </div>
                  )}
                  <button className="kebab-btn" onClick={e=>{e.stopPropagation();setTaskMenu(taskMenu===task.id?null:task.id);}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
                  </button>
                  {taskMenu===task.id&&(
                    <div className="ctx" onClick={e=>e.stopPropagation()}>
                      <button className="ctx-item" onClick={()=>{setEditingTask({id:task.id,val:task.title});setTaskMenu(null);}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        Rename
                      </button>
                      <button className="ctx-item" onClick={()=>{toggleTask(task.id);setTaskMenu(null);}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        {task.done?"Mark undone":"Mark done"}
                      </button>
                      <div className="ctx-divider"/>
                      <button className="ctx-item danger" onClick={()=>deleteTask(task.id)}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                        Delete
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ════ FOCUS TAB ════ */}
        {tab==="focus"&&(
          <div>
            <div className="page-header" style={{paddingBottom:18}}>
              <div className="eyebrow">Deep Work</div>
              <h1 className="page-title">Focus</h1>
              <div className="page-subtitle">25-min Pomodoro sessions</div>
            </div>
            <FocusTimer tasks={tasks}/>
            <div className="section-header"><div className="section-title">Pending Tasks</div></div>
            <div className="screen-pad">
              {tasks.filter(t=>!t.done).map(task=>(
                <div key={task.id} className={`task-card pri-${task.priority}`} onClick={e=>e.stopPropagation()}>
                  <div className={`check-circle ${task.done?"done":""}`} onClick={()=>toggleTask(task.id)}>
                    {task.done&&<CheckSVG/>}
                  </div>
                  <span className="task-text">{task.title}</span>
                </div>
              ))}
              {tasks.filter(t=>!t.done).length===0&&(
                <div className="empty">
                  <span className="empty-emoji">🎉</span>
                  <p className="empty-title">All done!</p>
                  <p className="empty-sub">No pending tasks. Take a well-earned break.</p>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ════ STATS TAB ════ */}
        {tab==="stats"&&(
          <div>
            <div className="page-header" style={{paddingBottom:18}}>
              <div className="eyebrow">Overview</div>
              <h1 className="page-title">Insights</h1>
              <div className="page-subtitle">Your productivity at a glance</div>
            </div>

            <div className="stats-grid">
              <div className="stat-card">
                <div className="stat-icon">🔥</div>
                <div className="stat-value">{streak}</div>
                <div className="stat-label">Day streak</div>
              </div>
              <div className="stat-card">
                <div className="stat-icon">✅</div>
                <div className="stat-value">{tasks.filter(t=>t.done).length}</div>
                <div className="stat-label">Done today</div>
              </div>
              <div className="stat-card">
                <div className="stat-icon">📊</div>
                <div className="stat-value">{weekStats.reduce((a,b)=>a+b,0)}</div>
                <div className="stat-label">This week</div>
              </div>
              <div className="stat-card">
                <div className="stat-icon">⚡</div>
                <div className="stat-value">{pct}%</div>
                <div className="stat-label">Completion</div>
              </div>
            </div>

            <div className="chart-card">
              <div className="chart-title">Tasks completed this week</div>
              <div className="chart-bars">
                {weekStats.map((v,i)=>{
                  const max=Math.max(...weekStats,1);
                  const isToday=i===today.getDay();
                  return(
                    <div key={i} className="chart-bar-wrap">
                      <div className="chart-bar-track">
                        <div className={`chart-bar-fill ${isToday?"today":""}`} style={{height:`${(v/max)*100}%`}}/>
                      </div>
                      <div className="chart-day-label" style={{color:isToday?"var(--peach)":"var(--text3)"}}>{DAYS_SHORT[i]}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="section-header"><div className="section-title">Habit Tracker</div></div>
            <div className="screen-pad">
              {habits.map(habit=>{
                const streak_h=habit.history.slice().reverse().findIndex(v=>!v);
                const habitStreak=streak_h===-1?habit.history.length:streak_h;
                return(
                  <div key={habit.id} className="habit-card">
                    <div className="habit-header">
                      <span className="habit-emoji">{habit.emoji}</span>
                      <div>
                        <div className="habit-name">{habit.name}</div>
                        <div className="habit-streak">🔥 {habitStreak} day streak</div>
                      </div>
                    </div>
                    <div className="habit-dots">
                      {habit.history.map((done,i)=>{
                        const isToday=i===today.getDay();
                        return(
                          <div key={i}
                            className={`habit-dot ${done?"done":""} ${isToday&&!done?"today":""}`}
                            style={{background:done?habit.color:undefined,boxShadow:done?`0 2px 8px ${habit.color}44`:undefined}}
                            onClick={()=>toggleHabit(habit.id,i)}>
                            {done?"✓":DAYS_SHORT[i][0]}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="section-header"><div className="section-title">Weekly Goals</div></div>
            <div className="screen-pad">
              <div style={{background:"var(--surface)",borderRadius:20,padding:"4px 18px 16px",boxShadow:"var(--card-shadow)",border:"1px solid var(--border)",marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"flex-end",paddingTop:14,marginBottom:4}}>
                  <span style={{background:"rgba(99,102,241,0.1)",color:"var(--indigo)",fontSize:11,fontWeight:700,padding:"3px 11px",borderRadius:20}}>
                    {goals.filter(g=>g.done).length}/{goals.length}
                  </span>
                </div>
                {goals.map(g=>(
                  <div key={g.id} className="goal-row" onClick={()=>toggleGoal(g.id)}>
                    <div className={`check-circle ${g.done?"done":""}`}>{g.done&&<CheckSVG/>}</div>
                    <span style={{fontSize:14.5,fontWeight:500,color:g.done?"var(--text3)":"var(--text)",textDecoration:g.done?"line-through":"none",transition:"all 0.2s"}}>{g.text}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ════ CALENDAR TAB ════ */}
        {tab==="calendar"&&(
          <div>
            <div className="page-header" style={{paddingBottom:0}}>
              <div className="eyebrow">Schedule</div>
              <h1 className="page-title">{MONTHS[today.getMonth()]}</h1>
            </div>
            <div className="date-strip">
              {dates.map(d=>{
                const sel=d.getDate()===selectedDate;
                const isToday=d.getDate()===today.getDate()&&d.getMonth()===today.getMonth();
                return(
                  <button key={d.getDate()} className={`date-chip ${sel?"selected":""}`} onClick={()=>setSelectedDate(d.getDate())}>
                    <span className="date-day">{DAYS_SHORT[d.getDay()]}</span>
                    <span className="date-num">{d.getDate()}</span>
                    <div className={`date-dot ${isToday?"has-event":""}`}/>
                  </button>
                );
              })}
            </div>
            <div className="section-header">
              <div className="section-title">Timeline <span className="section-badge">{sortedSchedule.length}</span></div>
            </div>
            <div className="screen-pad">
              {sortedSchedule.length===0&&(
                <div className="empty">
                  <span className="empty-emoji">🗓️</span>
                  <p className="empty-title">Nothing scheduled</p>
                  <p className="empty-sub">Tap + to add your first time block.</p>
                </div>
              )}
              {sortedSchedule.map(block=>(
                <div key={block.id} style={{display:"flex",gap:14,marginBottom:10}}>
                  <div style={{width:44,paddingTop:16,textAlign:"right",flexShrink:0}}>
                    <span style={{fontSize:10.5,fontWeight:700,color:"var(--text3)"}}>{block.time}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div className="sched-card" style={{borderLeft:`3px solid ${block.color}`}}>
                      <div className="sched-emoji" style={{background:block.color+"20"}}>{block.emoji}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontSize:14.5,fontWeight:600,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{block.title}</p>
                        <p style={{fontSize:11.5,color:"var(--text3)",marginTop:2}}>{block.time} · 1 hr</p>
                      </div>
                      <button className="kebab-btn" onClick={e=>{e.stopPropagation();setEditSched({...block});}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button className="kebab-btn" style={{marginLeft:-6}} onClick={()=>deleteBlock(block.id)}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2.2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── FABs ── */}
      {tab==="todo"&&(
        <button className={`fab fab-todo ${showTaskInput?"open":""}`} onClick={()=>setShowTaskInput(s=>!s)}>
          <span style={{display:"block",transition:"transform 0.28s ease",transform:showTaskInput?"rotate(45deg)":"none",lineHeight:1}}>+</span>
        </button>
      )}
      {tab==="calendar"&&(
        <button className="fab fab-cal" onClick={()=>setShowSchedModal(true)}>
          <span style={{lineHeight:1}}>+</span>
        </button>
      )}

      {/* ── BOTTOM NAV ── */}
      <div className="bottom-nav">
        {[
          {id:"todo",label:"Tasks",icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>},
          {id:"focus",label:"Focus",icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>},
          {id:"calendar",label:"Schedule",icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
          {id:"stats",label:"Insights",icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>},
        ].map(({id,label,icon})=>(
          <button key={id} className={`nav-btn ${tab===id?"active":""}`} onClick={()=>switchTab(id)}>
            <div className="nav-icon">
              <span style={{color:tab===id?"white":"var(--text3)",display:"flex"}}>{icon}</span>
            </div>
            <span>{label}</span>
          </button>
        ))}
      </div>

      {/* ── MODALS ── */}
      {showAI&&<AIModal onClose={()=>setShowAI(false)} onAdd={(t,ai,p)=>{addTask(t,ai,p);}}/>}

      {showSchedModal&&(
        <Modal title="Add Time Block" onClose={()=>setShowSchedModal(false)}>
          <div className="form-row"><label className="form-label">Time</label>
            <select className="input" value={schedForm.time} onChange={e=>setSchedForm({...schedForm,time:e.target.value})} style={{padding:"13px 14px"}}>
              {TIMES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="form-row"><label className="form-label">Title</label>
            <input autoFocus className="input" value={schedForm.title} onChange={e=>setSchedForm({...schedForm,title:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addBlock()} placeholder="What's happening?"/>
          </div>
          <div className="form-row"><label className="form-label">Emoji</label>
            <div className="emoji-grid">{EMOJIS.map(em=><button key={em} className={`ep-btn ${schedForm.emoji===em?"sel":""}`} onClick={()=>setSchedForm({...schedForm,emoji:em})}>{em}</button>)}</div>
          </div>
          <div className="form-row"><label className="form-label">Color</label>
            <div className="color-row">{COLORS.map(c=><div key={c} className={`c-dot ${schedForm.color===c?"sel":""}`} style={{background:c}} onClick={()=>setSchedForm({...schedForm,color:c})}/>)}</div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button className="btn btn-primary btn-full" onClick={addBlock} style={{flex:1,justifyContent:"center",background:"linear-gradient(135deg,var(--peach),#EA580C)",boxShadow:"0 4px 16px var(--peach-glow)"}}>Add Block</button>
            <button className="btn btn-ghost" onClick={()=>setShowSchedModal(false)}>Cancel</button>
          </div>
        </Modal>
      )}

      {editSched&&(
        <Modal title="Edit Block" onClose={()=>setEditSched(null)}>
          <div className="form-row"><label className="form-label">Time</label>
            <select className="input" value={editSched.time} onChange={e=>setEditSched({...editSched,time:e.target.value})} style={{padding:"13px 14px"}}>
              {TIMES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="form-row"><label className="form-label">Title</label>
            <input className="input" value={editSched.title} onChange={e=>setEditSched({...editSched,title:e.target.value})} onKeyDown={e=>e.key==="Enter"&&(saveBlock(editSched.id,editSched),setEditSched(null))}/>
          </div>
          <div className="form-row"><label className="form-label">Emoji</label>
            <div className="emoji-grid">{EMOJIS.map(em=><button key={em} className={`ep-btn ${editSched.emoji===em?"sel":""}`} onClick={()=>setEditSched({...editSched,emoji:em})}>{em}</button>)}</div>
          </div>
          <div className="form-row"><label className="form-label">Color</label>
            <div className="color-row">{COLORS.map(c=><div key={c} className={`c-dot ${editSched.color===c?"sel":""}`} style={{background:c}} onClick={()=>setEditSched({...editSched,color:c})}/>)}</div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button className="btn btn-primary btn-full" onClick={()=>{saveBlock(editSched.id,editSched);setEditSched(null);showToast("Saved ✅","✅");}} style={{flex:1,justifyContent:"center"}}>Save</button>
            <button className="btn btn-danger" onClick={()=>{deleteBlock(editSched.id);setEditSched(null);}}>Delete</button>
          </div>
        </Modal>
      )}

      {toast&&<Toast msg={toast.msg} emoji={toast.emoji}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}
</script>
</body>
</html>
